<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwable — Dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a1f2e;
      --border: #2d3441;
      --text: #e6e6e6;
      --muted: #8b95a5;
      --accent: #5eead4;
      --error: #f87171;
      --panel-event: #60a5fa;
      --judge-token: #a78bfa;
      --final: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      font-size: 14px;
      line-height: 1.5;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    h1 { font-size: 20px; margin: 0; color: var(--accent); }
    .status { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.green { background: #34d399; }
    .status-dot.red { background: var(--error); }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; } }
    .main { display: flex; flex-direction: column; gap: 16px; }
    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    select, input, textarea, button {
      font-family: inherit;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
    }
    select:focus, input:focus, textarea:focus { outline: 1px solid var(--accent); }
    textarea { width: 100%; min-height: 80px; resize: vertical; font-family: ui-monospace, SFMono-Regular, monospace; }
    button {
      cursor: pointer;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { background: var(--muted); cursor: not-allowed; }
    .events { max-height: 500px; overflow-y: auto; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; }
    .event { padding: 4px 0; border-bottom: 1px solid var(--border); word-break: break-word; }
    .event-time { color: var(--muted); font-size: 11px; margin-right: 8px; }
    .event-type {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .event-type.panel_start, .event-type.panel_done, .event-type.panel_token { background: rgba(96, 165, 250, 0.2); color: var(--panel-event); }
    .event-type.judge_start, .event-type.judge_done, .event-type.judge_token { background: rgba(167, 139, 250, 0.2); color: var(--judge-token); }
    .event-type.final { background: rgba(52, 211, 153, 0.2); color: var(--final); }
    .event-type.error { background: rgba(248, 113, 113, 0.2); color: var(--error); }
    .event-detail { color: var(--muted); }
    .model-list { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; }
    .model-list div { padding: 3px 0; }
    .model-loaded { color: var(--accent); }
    .model-empty { color: var(--muted); font-style: italic; }
    .preset-info { font-size: 12px; }
    .preset-info .preset-name { font-weight: 600; color: var(--accent); margin-bottom: 4px; }
    .preset-info .panel-list, .preset-info .judge { color: var(--muted); }
    .response-box {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
      padding: 12px;
      background: var(--bg);
      border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 13px;
    }
    .response-streaming {
      border-left: 2px solid var(--judge-token);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .gateway-input { display: flex; gap: 8px; }
    .gateway-input input { flex: 1; }
    .config-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .config-row label { font-size: 12px; color: var(--muted); min-width: 80px; }
    .config-row input, .config-row select { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔥 Qwable — Dashboard</h1>
      <div class="status" id="status-bar">
        <span><span class="status-dot green" id="status-dot"></span> <span id="status-text">Connected</span></span>
        <span>Preset: <span id="current-preset">—</span></span>
        <span>Last model: <span id="last-model">—</span></span>
      </div>
    </header>

    <div class="layout">
      <div class="main">
        <!-- Input panel -->
        <div class="panel">
          <div class="panel-title">Request</div>
          <div class="config-row">
            <label>Gateway</label>
            <div class="gateway-input">
              <input id="gateway-url" value="http://127.0.0.1:8088" />
              <button id="connect-btn">Reconnect</button>
            </div>
          </div>
          <div class="config-row">
            <label>Preset</label>
            <select id="preset-select">
              <option value="quality">quality (3 large models, ~66GB)</option>
              <option value="budget">budget (2 light models, ~38GB)</option>
              <option value="coding">coding (3 large, coder as judge)</option>
              <option value="heavy">heavy (2 large, ds4 judge)</option>
            </select>
          </div>
          <div class="config-row">
            <label>Model</label>
            <select id="model-select">
              <option value="qwable-fusion">qwable-fusion (OpenAI Chat)</option>
              <option value="claude-qwable-fusion">claude-qwable-fusion (Anthropic)</option>
            </select>
          </div>
          <textarea id="prompt-input" placeholder="Type your question here...">Compare mergesort and quicksort for 50k records.</textarea>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button id="send-btn" style="flex: 1;">▶ Send (stream)</button>
            <button id="clear-btn" style="background: var(--muted);">Clear</button>
          </div>
        </div>

        <!-- Streaming events panel -->
        <div class="panel">
          <div class="panel-title">Streaming Events</div>
          <div class="events" id="events-list">
            <div class="event"><span class="event-detail">No events yet. Send a request to see streaming events.</span></div>
          </div>
        </div>

        <!-- Response panel -->
        <div class="panel">
          <div class="panel-title">Final Response</div>
          <div class="response-box" id="response-box">
            <span class="model-empty">—</span>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <!-- Preset info -->
        <div class="panel">
          <div class="panel-title">Preset Details</div>
          <div class="preset-info" id="preset-info">
            <div class="model-empty">Loading...</div>
          </div>
        </div>

        <!-- Loaded models -->
        <div class="panel">
          <div class="panel-title">Loaded Models (auto-refresh 5s)</div>
          <div class="model-list" id="loaded-models">
            <div class="model-empty">Loading...</div>
          </div>
        </div>

        <!-- System status -->
        <div class="panel">
          <div class="panel-title">System</div>
          <div class="preset-info">
            <div>ds4: <span id="ds4-status" class="model-empty">?</span></div>
            <div>Models: <span id="total-models">?</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── State ─────────────────────────────────────────────────────
    let gatewayUrl = "http://127.0.0.1:8088";
    let presets = {};
    let lastEventId = 0;

    // ─── DOM helpers ──────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const escapeHtml = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    function appendEvent(type, detail) {
      const events = $("events-list");
      const eventId = ++lastEventId;
      const time = new Date().toLocaleTimeString();
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `<span class="event-time">${time}</span><span class="event-type ${type}">${type}</span><span class="event-detail">${escapeHtml(detail)}</span>`;
      events.appendChild(div);
      // Auto-scroll if near bottom
      const isNearBottom = events.scrollTop + events.clientHeight >= events.scrollHeight - 50;
      if (isNearBottom) events.scrollTop = events.scrollHeight;
      // Cap at 500 events
      while (events.children.length > 500) events.removeChild(events.firstChild);
    }

    function clearEvents() {
      $("events-list").innerHTML = '<div class="event"><span class="event-detail">Cleared.</span></div>';
      $("response-box").innerHTML = '<span class="model-empty">—</span>';
      $("response-box").classList.remove("response-streaming");
    }

    // ─── API calls ────────────────────────────────────────────────
    async function fetchPresets() {
      try {
        const r = await fetch(`${gatewayUrl}/v1/fusion/presets`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        presets = data.presets;
        renderPresetInfo();
        $("total-models").textContent = Object.keys(data.presets).length;
        $("ds4-status").textContent = data.ds4_reachable ? "✓ reachable" : "✗ unreachable";
        $("ds4-status").className = data.ds4_reachable ? "model-loaded" : "model-empty";
        setStatus(true, "Connected");
        return data;
      } catch (err) {
        setStatus(false, `Cannot reach ${gatewayUrl}`);
        return null;
      }
    }

    async function fetchLoadedModels() {
      try {
        const r = await fetch(`${gatewayUrl}/v1/fusion/presets/loaded`);
        if (!r.ok) return;
        const data = await r.json();
        const loaded = data.loaded_models || [];
        const el = $("loaded-models");
        if (loaded.length === 0) {
          el.innerHTML = '<div class="model-empty">No models loaded</div>';
        } else {
          el.innerHTML = loaded.map(m => `<div class="model-loaded">✓ ${escapeHtml(m)}</div>`).join("");
        }
        if (data.last_used_model) {
          $("last-model").textContent = data.last_used_model;
        }
      } catch (err) {
        // Silent
      }
    }

    function setStatus(ok, text) {
      $("status-text").textContent = text;
      $("status-dot").className = ok ? "status-dot green" : "status-dot red";
    }

    function renderPresetInfo() {
      const name = $("preset-select").value;
      const p = presets[name];
      if (!p) {
        $("preset-info").innerHTML = '<div class="model-empty">No data</div>';
        return;
      }
      $("preset-info").innerHTML = `
        <div class="preset-name">${escapeHtml(name)}</div>
        <div class="judge">Judge: <strong>${escapeHtml(p.judge)}</strong> (${escapeHtml(p.judge_backend)})</div>
        <div class="panel-list">Panel:</div>
        ${p.panel.map(m => `<div class="panel-list">• ${escapeHtml(m)}</div>`).join("")}
        <div class="panel-list" style="margin-top: 8px;">${escapeHtml(p.description)}</div>
      `;
    }

    // ─── Streaming send ──────────────────────────────────────────
    async function sendStream() {
      const prompt = $("prompt-input").value.trim();
      if (!prompt) return;

      const preset = $("preset-select").value;
      const model = $("model-select").value;
      const isAnthropic = model.startsWith("claude-");

      $("send-btn").disabled = true;
      $("send-btn").textContent = "⏳ Streaming...";
      clearEvents();
      $("response-box").classList.add("response-streaming");
      $("response-box").textContent = "";

      appendEvent("client_request", `preset=${preset} model=${model} prompt_len=${prompt.length}`);

      const body = {
        model: model,
        messages: [{ role: "user", content: prompt }],
        fusion: { preset: preset },
        stream: true,
        max_tokens: 4000,
      };

      try {
        const endpoint = isAnthropic
          ? `${gatewayUrl}/v1/messages`
          : `${gatewayUrl}/v1/chat/completions`;

        // For Anthropic, use a different body shape
        if (isAnthropic) {
          body.max_tokens = 4000;
        }

        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!r.ok) {
          const errText = await r.text();
          appendEvent("error", `HTTP ${r.status}: ${errText.slice(0, 200)}`);
          return;
        }
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let fullText = "";
        let panelStarted = 0;
        let judgeStarted = 0;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line) continue;

            // SSE comment (panel events from gateway)
            if (line.startsWith(":")) {
              const comment = line.slice(1).trim();
              if (comment.startsWith("fusion ")) {
                const m = comment.match(/^fusion (\w+): (.+)$/);
                if (m) {
                  appendEvent(m[1], m[2]);
                  if (m[1] === "panel_start") panelStarted++;
                  if (m[1] === "judge_start") judgeStarted++;
                }
              }
              continue;
            }

            // SSE data line
            if (line.startsWith("data: ")) {
              const payload = line.slice(6);
              if (payload === "[DONE]") continue;
              try {
                const data = JSON.parse(payload);
                // OpenAI Chat: choices[0].delta.content
                if (data.choices?.[0]?.delta?.content) {
                  const delta = data.choices[0].delta.content;
                  fullText += delta;
                  $("response-box").textContent = fullText;
                  if (judgeStarted > 0 || fullText.length > 0) {
                    // First token after judge_start
                    if (judgeStarted > 0 && fullText.length === delta.length) {
                      appendEvent("judge_token", JSON.stringify(delta).slice(0, 50));
                    }
                  }
                }
                // Anthropic: content_block_delta
                if (data.type === "content_block_delta" && data.delta?.text) {
                  const delta = data.delta.text;
                  fullText += delta;
                  $("response-box").textContent = fullText;
                }
                if (data.type === "message_stop" || data.choices?.[0]?.finish_reason === "stop") {
                  appendEvent("client_done", `total_chars=${fullText.length}`);
                }
              } catch (e) {
                // Skip malformed lines
              }
            }
          }
        }
        $("response-box").classList.remove("response-streaming");
        appendEvent("client_stream_closed", `final_length=${fullText.length}`);
      } catch (err) {
        appendEvent("error", err.message);
      } finally {
        $("send-btn").disabled = false;
        $("send-btn").textContent = "▶ Send (stream)";
      }
    }

    // ─── Event wiring ─────────────────────────────────────────────
    $("connect-btn").addEventListener("click", () => {
      gatewayUrl = $("gateway-url").value.trim().replace(/\/$/, "");
      $("gateway-url").value = gatewayUrl;
      fetchPresets();
    });
    $("gateway-url").addEventListener("change", (e) => {
      gatewayUrl = e.target.value.trim().replace(/\/$/, "");
      e.target.value = gatewayUrl;
    });
    $("send-btn").addEventListener("click", sendStream);
    $("clear-btn").addEventListener("click", clearEvents);
    $("preset-select").addEventListener("change", () => {
      $("current-preset").textContent = $("preset-select").value;
      renderPresetInfo();
    });
    $("prompt-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        sendStream();
      }
    });

    // ─── Init ─────────────────────────────────────────────────────
    (async () => {
      await fetchPresets();
      $("current-preset").textContent = $("preset-select").value;
      await fetchLoadedModels();
      setInterval(fetchLoadedModels, 5000);
    })();
  </script>
</body>
</html>
